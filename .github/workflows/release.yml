name: Build and Release Debian Packages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }} package
    runs-on: ${{ matrix.runner }}
    # Build inside Debian Bullseye so the resulting binaries link against
    # glibc 2.31 — that makes the .deb run on Pi OS Bullseye, Debian 11,
    # Ubuntu 20.04 and anything newer. Without this the runner's glibc
    # (2.35 on ubuntu-22.04-arm, 2.39 on ubuntu-latest) leaks into the
    # binary and breaks installs on older arm64 boards.
    container: debian:bullseye-slim
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-22.04-arm

    steps:
      # bullseye-slim ships without git/curl/etc., which actions/checkout
      # and the Flutter installer both expect to be present.
      - name: Bootstrap container tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git curl ca-certificates xz-utils unzip sudo

      - name: Checkout repository
        uses: actions/checkout@v4

      # The container runs as root while the workspace is owned by a
      # different uid — git refuses to operate on it without this opt-in.
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory '*'

      - name: Install build dependencies
        run: |
          apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev dpkg-dev libstdc++-10-dev

      - name: Install Flutter
        run: |
          git clone --depth 1 https://github.com/flutter/flutter.git -b stable "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          "$HOME/flutter/bin/flutter" --version
          "$HOME/flutter/bin/flutter" config --enable-linux-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Debian package
        run: scripts/build_deb.sh --arch ${{ matrix.arch }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: build/kanshi-gui_*_${{ matrix.arch }}.deb

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          version=$(awk -F': ' '/^version:/{print $2}' pubspec.yaml)
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: deb-*
          merge-multiple: true
          path: dist

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          artifacts: dist/*.deb
          artifactErrorsFailBuild: true
          allowUpdates: true
          makeLatest: true
